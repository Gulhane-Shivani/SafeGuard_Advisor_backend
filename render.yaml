services:
  - type: web
    name: safeguard-advisor-backend
    env: python
    plan: free

    buildCommand: "bash build.sh"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"

    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DATABASE_URL
        fromEnvVar: DATABASE_URL
      - key: SECRET_KEY
        fromEnvVar: SECRET_KEY