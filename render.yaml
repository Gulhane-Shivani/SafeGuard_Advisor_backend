services:
  - type: web
    name: safeguard-advisor-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CARGO_HOME
        value: /opt/render/project/src/.cargo
      - key: DATABASE_URL
        fromEnvVar: DATABASE_URL
      - key: SECRET_KEY
        fromEnvVar: SECRET_KEY
